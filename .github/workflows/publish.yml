name: publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish-windows:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Resolve release metadata
        id: release_meta
        shell: pwsh
        run: |
          $package = Get-Content package.json -Raw | ConvertFrom-Json
          $version = $package.version
          $tag = "v$version"

          if ("${{ github.ref_type }}" -eq "tag") {
            $tag = "${{ github.ref_name }}"
            $version = $tag.TrimStart("v")
          }

          if ($package.version -ne $version) {
            throw "Release version $version does not match package.json version $($package.version)."
          }

          $releaseBody = & .\scripts\get-release-notes.ps1 -Version $version

          Add-Content -Path $env:GITHUB_OUTPUT -Value "tag=$tag"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "version=$version"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "release_body<<EOF"
          Add-Content -Path $env:GITHUB_OUTPUT -Value $releaseBody
          Add-Content -Path $env:GITHUB_OUTPUT -Value "EOF"

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: .
          tagName: ${{ steps.release_meta.outputs.tag }}
          releaseName: VibeCal v${{ steps.release_meta.outputs.version }}
          releaseBody: ${{ steps.release_meta.outputs.release_body }}
          releaseDraft: false
          prerelease: false
